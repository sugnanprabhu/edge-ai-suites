global:
  externalIP: ""
  # Set to true to retain the OVMS model PVC on helm uninstall.
  keepPvc: false
  # Hugging Face token — required only for initial download of gated models.
  huggingfaceToken: ""

  proxy:
    httpProxy: ""
    httpsProxy: ""
    noProxy: "localhost,127.0.0.1,.svc.cluster.local"

  gpu:
    enabled: false
    # key: GPU resource label from device plugin (e.g. gpu.intel.com/i915 or gpu.intel.com/xe)
    key: ""
    device: ""
    count: 1
    # GIDs for render/video/i2c group access — verify on your GPU node with:
    #   getent group render video | cut -d: -f3
    supplementalGroups: [109, 110, 992]

  serviceAccount:
    create: true

  # Registry prefix for first-party images, e.g. "myregistry.example.com/"
  registry: ""

  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

  utilities:
    curl:
      image: curlimages/curl
      tag: "8.7.1"
    busybox:
      image: busybox
      tag: "1.36"

  ovmsPort: 8000
  metricsPort: 9090
  ovmsModelName: "Phi-3.5-Vision"
  ovmsLLMModelName: "Phi-4-mini-instruct-int4-ov"
  appNodePort: 30900
  metricsNodePort: 30090

_ovmsDefaults: &ovmsDefaults
  image:
    repository: openvino/model_server
    tag: "2026.1-gpu"
  task: "text_generation"
  runAsUser: 5000
  healthcheck:
    startupFailureThreshold: 60
    startupPeriodSeconds: 10
    startupTimeoutSeconds: 5
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
  nodeSelector: {}
  affinity: {}
  tolerations: []

ovms:
  <<: *ovmsDefaults
  sourceModel: "OpenVINO/Phi-3.5-vision-instruct-int4-ov"
  pipelineType: "VLM"
  modelStorage:
    storageClassName: ""
    size: "10Gi"

ovms-llm:
  <<: *ovmsDefaults
  enabled: true  # Set to false (with app.useAdk=false) to disable LLM service
  sourceModel: "OpenVINO/Phi-4-mini-instruct-int4-ov"
  modelStorage:
    storageClassName: ""
    size: "6Gi"

app:
  image:
    registry: "intel/"  # Override global.registry for this component only
    repository: live-video-alert-agent
    tag: "latest"
  port: 9000
  service:
    type: NodePort
    port: 9000
  rtspUrl: ""
  logLevel: "INFO"
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
  healthcheck:
    path: /health
    startupInitialDelaySeconds: 5
    startupPeriodSeconds: 5
    startupFailureThreshold: 30
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  nodeSelector: {}
  affinity: {}
  tolerations: []
  # Agentic dispatch
  useAdk: true
  # Video capture
  captureFps: 10
  # Action tools — webhook
  webhookUrl: ""
  webhookSecret: ""
  # Action tools — MQTT
  mqttBroker: ""
  mqttPort: 1883
  mqttUsername: ""
  mqttPassword: ""
  mqttBaseTopic: "alerts/live-video"
  # MCP integration
  mcpEnabled: true
  # MCP server configuration (JSON content mounted as /app/resources/mcp_servers.json)
  mcpServersConfig: |
    {
      "servers": [
        {
          "name": "prometheus",
          "enabled": false,
          "transport": "http",
          "url": "<mcp_server_url>/mcp",
          "description": "Prometheus MCP Server - query metrics, get alerts, analyze system performance",
          "timeout": 30.0
        }
      ]
    }
  # Host path for collector-signals — must match collector.collectorSignalsPath
  collectorSignalsPath: /opt/lva/collector-signals

metrics-service:
  enabled: true
  image:
    repository: "intel/live-metrics-service"
    tag: "1.0.0"
  service:
    type: NodePort
  corsOrigins: "*"
  logLevel: "INFO"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  healthcheck:
    startupInitialDelaySeconds: 5
    startupPeriodSeconds: 5
    startupFailureThreshold: 30
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  nodeSelector: {}
  affinity: {}
  tolerations: []

collector:
  enabled: true
  # Must match app.collectorSignalsPath — both sides mount the same host directory.
  collectorSignalsPath: /opt/lva/collector-signals
  image:
    registry: "intel/"
    repository: vippet-collector
    tag: "2026.0.0"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  nodeSelector: {}
  affinity: {}
  tolerations: []
