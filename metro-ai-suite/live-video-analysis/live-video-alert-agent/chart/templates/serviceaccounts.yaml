{{- if .Values.global.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-live-video-alert-agent-sa
  labels:
    {{- include "lva.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-ovms-sa
  labels:
    {{- include "lva.labels" . | nindent 4 }}
    app.kubernetes.io/component: inference
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-ovms-llm-sa
  labels:
    {{- include "lva.labels" . | nindent 4 }}
    app.kubernetes.io/component: inference
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-metrics-service-sa
  labels:
    {{- include "lva.labels" . | nindent 4 }}
    app.kubernetes.io/component: metrics
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-collector-sa
  labels:
    {{- include "lva.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector
automountServiceAccountToken: false
{{- end }}
