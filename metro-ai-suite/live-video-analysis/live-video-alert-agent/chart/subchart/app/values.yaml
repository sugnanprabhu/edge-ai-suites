image:
  registry: ""  # Override global.registry for this component only

port: 9000

service:
  type: NodePort
  port: 9000

rtspUrl: ""
logLevel: "INFO"

# Agentic dispatch — mirrors USE_ADK env var
useAdk: true

# Video capture
captureFps: 10

# Action tools — webhook
webhookUrl: ""
webhookSecret: ""

# Action tools — MQTT
mqttBroker: ""
mqttPort: 1883
mqttUsername: ""
mqttPassword: ""
mqttBaseTopic: "alerts/live-video"

# MCP integration
mcpEnabled: true

# Host path for collector-signals — must match collector.collectorSignalsPath.
# The app writes fps.txt here; the collector reads it via telegraf.
collectorSignalsPath: /opt/lva/collector-signals

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "2"
    memory: "2Gi"

healthcheck:
  path: /health
  startupInitialDelaySeconds: 5
  startupPeriodSeconds: 5
  startupFailureThreshold: 30
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

nodeSelector: {}
affinity: {}
tolerations: []
