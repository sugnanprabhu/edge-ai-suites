{{- if .Values.mcpEnabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app.fullname" . }}-mcp
  labels:
    {{- include "app.labels" . | nindent 4 }}
data:
  mcp_servers.json: |
    {{- .Values.mcpServersConfig | nindent 4 }}
{{- end }}
