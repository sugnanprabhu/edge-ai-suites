{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "collector.fullname" . }}
  labels:
    {{- include "collector.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "collector.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "collector.fullname" . }}
        app.kubernetes.io/component: collector
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "collector.serviceAccountName" . }}
      automountServiceAccountToken: false
      hostPID: true  # Required: telegraf reads host process table for GPU hardware metrics
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else }}
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: {{ printf "%s-ovms" .Release.Name }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: init-collector-signals
          image: {{ .Values.global.utilities.busybox.image }}:{{ .Values.global.utilities.busybox.tag }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - mkdir -p {{ .Values.collectorSignalsPath }} && chmod 777 {{ .Values.collectorSignalsPath }}
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: collector-signals
              mountPath: {{ .Values.collectorSignalsPath }}
      containers:
        - name: collector
          image: "{{ .Values.image.registry }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            {{- include "collector.proxyEnv" . | nindent 12 }}
            - name: WEBSOCKET_URL
              value: {{ printf "ws://%s-metrics-service:%d/ws/collector" .Release.Name (.Values.global.metricsPort | int) | quote }}
          securityContext:
            privileged: true  # Required: access host GPU devices (/dev/dri) and hardware sensors
          volumeMounts:
            - name: telegraf-config
              mountPath: /etc/telegraf/telegraf.conf
              subPath: telegraf.conf
              readOnly: true
            - name: host-dev
              mountPath: /dev
              readOnly: true
            - name: host-sys
              mountPath: /sys
              readOnly: true
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-run
              mountPath: /host/run
              readOnly: true
            - name: collector-signals
              mountPath: /app/.collector-signals
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: telegraf-config
          configMap:
            name: {{ include "collector.fullname" . }}-config
        - name: host-dev
          hostPath:
            path: /dev
        - name: host-sys
          hostPath:
            path: /sys
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-run
          hostPath:
            path: /run
        - name: collector-signals
          hostPath:
            path: {{ .Values.collectorSignalsPath }}
            type: DirectoryOrCreate
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
