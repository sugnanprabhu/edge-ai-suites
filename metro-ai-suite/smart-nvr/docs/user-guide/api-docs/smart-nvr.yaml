openapi: 3.1.0
info:
  title: NVR Event Router
  description: FastAPI app to interface with Frigate and handle event routing
  version: 1.0.0
paths:
  /health:
    get:
      summary: Health check for NVR Event Router service
      description: 'Basic health check endpoint for Docker Compose or monitoring.

        Returns 200 OK if service is running.'
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /cameras:
    get:
      summary: Get list of camera names
      operationId: get_cameras_cameras_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /events:
    get:
      summary: Get list of events for a specific camera
      operationId: get_camera_events_events_get
      parameters:
      - name: camera
        in: query
        required: true
        schema:
          type: string
          title: Camera
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /summary/{camera_name}:
    get:
      summary: Stream video using clip.mp4 API
      operationId: summarize_video_summary__camera_name__get
      parameters:
      - name: camera_name
        in: path
        required: true
        schema:
          type: string
          title: Camera Name
      - name: start_time
        in: query
        required: true
        schema:
          type: number
          title: Start Time
      - name: end_time
        in: query
        required: true
        schema:
          type: number
          title: End Time
      - name: download
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Download
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /search-embeddings/{camera_name}:
    get:
      summary: Stream video using clip.mp4 API
      operationId: search_video_embeddings_search_embeddings__camera_name__get
      parameters:
      - name: camera_name
        in: path
        required: true
        schema:
          type: string
          title: Camera Name
      - name: start_time
        in: query
        required: true
        schema:
          type: number
          title: Start Time
      - name: end_time
        in: query
        required: true
        schema:
          type: number
          title: End Time
      - name: download
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Download
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /summary-status/{summary_id}:
    get:
      summary: Get the summary using id
      operationId: get_summary_summary_status__summary_id__get
      parameters:
      - name: summary_id
        in: path
        required: true
        schema:
          type: string
          title: Summary Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /rules/responses/:
    get:
      summary: Get All Rule Summaries
      operationId: get_all_rule_summaries_rules_responses__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /rules/search-responses/:
    get:
      summary: Get Search Responses
      description: Fetch search responses for all rules with action 'search'.
      operationId: get_search_responses_rules_search_responses__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /rules/:
    get:
      summary: List Rules
      operationId: list_rules_rules__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
    post:
      summary: Add Rule
      operationId: add_rule_rules__post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Rule'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /rules/{rule_id}:
    get:
      summary: Get Rule
      operationId: get_rule_rules__rule_id__get
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: string
          title: Rule Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Delete Rule
      operationId: delete_rule_rules__rule_id__delete
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: string
          title: Rule Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /watchers/enable:
    get:
      summary: Alias to fetch current watcher mapping (GET)
      description: 'Provide a GET alias on /watchers/enable so users who query that
        endpoint directly

        (expecting state) receive the same response as /watchers/mapping.'
      operationId: get_camera_watcher_mapping_alias_watchers_enable_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
    post:
      summary: Enable/disable directory watcher for cameras
      operationId: set_camera_watchers_watchers_enable_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CameraWatcherRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /watchers/mapping:
    get:
      summary: Get current camera watcher enable/disable mapping
      description: "Return merged camera watcher mapping.\n\nPriority order:\n  1.\
        \ In-memory runtime mapping (reflects changes since process start)\n  2. Persisted\
        \ Redis mapping (authoritative across restarts)\n\nIf Redis is unavailable,\
        \ fall back to in-memory only."
      operationId: get_camera_watcher_mapping_watchers_mapping_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /:
    get:
      summary: Root
      operationId: root__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    CameraWatcherRequest:
      properties:
        cameras:
          items:
            additionalProperties:
              type: boolean
            type: object
          type: array
          title: Cameras
      type: object
      required:
      - cameras
      title: CameraWatcherRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    Rule:
      properties:
        id:
          type: string
          title: Id
        label:
          type: string
          title: Label
        action:
          type: string
          title: Action
        camera:
          anyOf:
          - type: string
          - type: 'null'
          title: Camera
        source:
          anyOf:
          - type: string
          - type: 'null'
          title: Source
        count:
          anyOf:
          - type: integer
          - type: 'null'
          title: Count
      type: object
      required:
      - id
      - label
      - action
      title: Rule
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError

