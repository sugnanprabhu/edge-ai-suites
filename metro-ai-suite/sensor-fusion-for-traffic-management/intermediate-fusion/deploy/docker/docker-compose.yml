services:
  bevfusion:
    image: ${DOCKER_IMAGE:-tfcc:2026.1.0-ubuntu24}
    pull_policy: missing
    build:
      context: ..
      dockerfile: docker/Dockerfile.dockerfile
      network: host
      additional_contexts:
        custom_openvino: ${CUSTOM_OPENVINO_INSTALL_DIR}
      args:
        - http_proxy=${http_proxy}
        - https_proxy=${https_proxy}
        - BASE=${BASE}
        - BASE_VERSION=${BASE_VERSION}
        - CUSTOM_OPENVINO_INSTALL_DIR=${CUSTOM_OPENVINO_INSTALL_DIR}
    network_mode: host
    environment:
      - no_proxy=localhost,127.0.0.1
      - http_proxy=${http_proxy}
      - https_proxy=${https_proxy}
      - ZE_ENABLE_ALT_DRIVERS=libze_intel_vpu.so 
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    cap_add:
      - SYS_ADMIN
    devices:
      - "/dev/dri:/dev/dri"
    group_add:
      - ${VIDEO_GROUP_ID}
      - ${RENDER_GROUP_ID}
    volumes:
      - "/tmp/.X11-unix:/tmp/.X11-unix"
      - "${HOME}/.Xauthority:/home/tfcc/.Xauthority:rw"
    working_dir: /home/tfcc/bevfusion
    entrypoint: /bin/bash
    tty: true
    stdin_open: true
    healthcheck:
      test: ["CMD", "test", "-d", "/home/tfcc/bevfusion"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
