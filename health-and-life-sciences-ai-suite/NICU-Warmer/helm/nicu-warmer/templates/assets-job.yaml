{{- if .Values.assets.loadJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: nicu-load-assets
  labels:
    {{- include "nicu-warmer.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: nicu-load-assets
    spec:
      restartPolicy: Never
      containers:
        - name: load-assets
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e

              copy_first_match() {
                dest_dir="$1"
                description="$2"
                shift 2

                mkdir -p "$dest_dir"

                for pattern in "$@"; do
                  for match in $pattern; do
                    if [ -e "$match" ]; then
                      cp "$match" "$dest_dir/"
                      echo "Copied $description from $match"
                      return 0
                    fi
                  done
                done

                echo "Missing required asset: $description" >&2
                return 1
              }

              echo "=== Loading NICU Warmer assets from offline bundle ==="

              # Models
              echo "Copying detection models..."
              copy_first_match /models "person detection xml" \
                /assets/models/person-detect-fp32.xml \
                /assets/person-detect-fp32.xml
              copy_first_match /models "person detection bin" \
                /assets/models/person-detect-fp32.bin \
                /assets/person-detect-fp32.bin
              copy_first_match /models "patient detection xml" \
                /assets/models/patient-detect-fp32.xml \
                /assets/patient-detect-fp32.xml
              copy_first_match /models "patient detection bin" \
                /assets/models/patient-detect-fp32.bin \
                /assets/patient-detect-fp32.bin
              copy_first_match /models "latch detection xml" \
                /assets/models/latch-detect-fp32.xml \
                /assets/latch-detect-fp32.xml
              copy_first_match /models "latch detection bin" \
                /assets/models/latch-detect-fp32.bin \
                /assets/latch-detect-fp32.bin

              echo "Copying rPPG models..."
              copy_first_match /models/rppg "rPPG xml" \
                /assets/models/rppg/mtts_can.xml \
                /assets/models_rppg/mtts_can.xml
              copy_first_match /models/rppg "rPPG bin" \
                /assets/models/rppg/mtts_can.bin \
                /assets/models_rppg/mtts_can.bin

              echo "Copying action recognition models..."
              copy_first_match /models/action/FP32 "action encoder xml" \
                /assets/models/action/FP32/action-recognition-0001-encoder.xml \
                /assets/model_artifacts/action/FP32/action-recognition-0001-encoder.xml \
                /assets/action-recognition-0001-encoder.xml
              copy_first_match /models/action/FP32 "action encoder bin" \
                /assets/models/action/FP32/action-recognition-0001-encoder.bin \
                /assets/model_artifacts/action/FP32/action-recognition-0001-encoder.bin \
                /assets/action-recognition-0001-encoder.bin
              copy_first_match /models/action/FP32 "action decoder xml" \
                /assets/models/action/FP32/action-recognition-0001-decoder.xml \
                /assets/model_artifacts/action/FP32/action-recognition-0001-decoder.xml \
                /assets/action-recognition-0001-decoder.xml
              copy_first_match /models/action/FP32 "action decoder bin" \
                /assets/models/action/FP32/action-recognition-0001-decoder.bin \
                /assets/model_artifacts/action/FP32/action-recognition-0001-decoder.bin \
                /assets/action-recognition-0001-decoder.bin
              copy_first_match /models/action "kinetics labels" \
                /assets/models/action/kinetics.txt \
                /assets/model_artifacts/action/kinetics.txt \
                /assets/kinetics.txt

              # Video
              echo "Copying video assets..."
              copy_first_match /uploads "demo video" \
                /assets/videos/*.mp4 \
                /assets/*.mp4

              echo "=== All assets loaded successfully ==="
              ls -lhR /models/
              ls -lh /uploads/
          volumeMounts:
            - name: assets-source
              mountPath: /assets
              readOnly: true
            - name: models
              mountPath: /models
            - name: uploads
              mountPath: /uploads
      volumes:
        - name: assets-source
          hostPath:
            path: {{ .Values.assets.loadJob.hostPath }}
            type: Directory
        - name: models
          persistentVolumeClaim:
            claimName: {{ .Values.models.claimName }}
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ .Values.uploads.claimName }}
{{- end }}
