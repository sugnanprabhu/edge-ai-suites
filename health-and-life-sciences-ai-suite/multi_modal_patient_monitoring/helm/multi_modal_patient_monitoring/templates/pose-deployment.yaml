apiVersion: apps/v1
kind: Deployment
metadata:
  name: pose
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pose
  template:
    metadata:
      labels:
        app: pose
    spec:
      initContainers:
        - name: wait-for-pose-assets
          image: "{{ .Values.pose.image.repository }}/{{ .Values.pose.image.name }}:{{ .Values.pose.image.tag }}"
          imagePullPolicy: {{ .Values.pose.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              MODEL="/models/3d-pose/human-pose-estimation-3d-0001.xml"
              VIDEO="/videos/3d-pose/face-demographics-walking.mp4"
              for i in $(seq 1 120); do
                if [ -f "$MODEL" ] && [ -f "$VIDEO" ]; then
                  echo "Pose assets found"
                  exit 0
                fi
                echo "Waiting for pose assets..."
                sleep 5
              done
              echo "Timed out waiting for pose assets"
              exit 1
          volumeMounts:
            - name: models
              mountPath: /models
            - name: videos
              mountPath: /videos
      containers:
        - name: pose
          image: "{{ .Values.pose.image.repository }}/{{ .Values.pose.image.name }}:{{ .Values.pose.image.tag }}"
          imagePullPolicy: {{ .Values.pose.image.pullPolicy }}
          command: ["python3"]
          args:
            - "/app/app.py"
            - "--model"
            - "/models/3d-pose/human-pose-estimation-3d-0001.xml"
            - "--video"
            - "/videos/3d-pose/face-demographics-walking.mp4"
            - "--aggregator"
            - "aggregator:50051"
            - "--source-id"
            - "3d-pose-camera-1"
          securityContext:
            privileged: true
          envFrom:
            - configMapRef:
                name: device-config
          ports:
            - containerPort: 8083
            - name: video-feed
              containerPort: 8085
              hostPort: 8085
              protocol: TCP
          env:
            - name: AGGREGATOR_ADDRESS
              value: "aggregator:50051"
            - name: AGGREGATOR_HOST
              value: aggregator
            - name: AGGREGATOR_PORT
              value: "50051"
            - name: NO_PROXY
              value: "aggregator,localhost,127.0.0.1"
            - name: no_proxy
              value: "aggregator,localhost,127.0.0.1"
            {{- if eq .Values.devices.POSE_3D_DEVICE "NPU" }}
            - name: ZE_ENABLE_ALT_DRIVERS
              value: "libze_intel_npu.so"
            {{- end }}
          volumeMounts:
            - name: models
              mountPath: /models
            - name: videos
              mountPath: /videos
            - name: dri
              mountPath: /dev/dri
            - name: dev
              mountPath: /dev
            {{- if eq .Values.devices.POSE_3D_DEVICE "NPU" }}
            - name: accel
              mountPath: /dev/accel
            {{- end }}
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: models-pvc
        - name: videos
          persistentVolumeClaim:
            claimName: videos-pvc
        - name: dri
          hostPath:
            path: /dev/dri
        - name: dev
          hostPath:
            path: /dev
        {{- if eq .Values.devices.POSE_3D_DEVICE "NPU" }}
        - name: accel
          hostPath:
            path: /dev/accel
        {{- end }}