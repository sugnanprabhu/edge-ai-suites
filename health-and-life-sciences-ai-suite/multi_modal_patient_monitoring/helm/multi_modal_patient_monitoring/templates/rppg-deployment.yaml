apiVersion: apps/v1
kind: Deployment
metadata:
  name: rppg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rppg
  template:
    metadata:
      labels:
        app: rppg
    spec:
      initContainers:
        - name: wait-for-rppg-assets
          image: "{{ .Values.rppg.image.repository }}/{{ .Values.rppg.image.name }}:{{ .Values.rppg.image.tag }}"
          imagePullPolicy: {{ .Values.rppg.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              MODEL_XML="/models/rppg/mtts_can.xml"
              MODEL_HDF5="/models/rppg/mtts_can.hdf5"
              VIDEO="/videos/rppg/sample.mp4"
              for i in $(seq 1 120); do
                if [ -f "$VIDEO" ] && { [ -f "$MODEL_XML" ] || [ -f "$MODEL_HDF5" ]; }; then
                  echo "RPPG assets found"
                  exit 0
                fi
                echo "Waiting for RPPG assets..."
                sleep 5
              done
              echo "Timed out waiting for RPPG assets"
              exit 1
          volumeMounts:
            - name: models
              mountPath: /models
            - name: videos
              mountPath: /videos
      containers:
        - name: rppg
          image: "{{ .Values.rppg.image.repository }}/{{ .Values.rppg.image.name }}:{{ .Values.rppg.image.tag }}"
          imagePullPolicy: {{ .Values.rppg.image.pullPolicy }}
          securityContext:
            privileged: true
          envFrom:
            - configMapRef:
                name: device-config
          ports:
            - containerPort: 5004
            - containerPort: 8084
          env:
            - name: AGGREGATOR_HOST
              value: aggregator
            - name: AGGREGATOR_PORT
              value: "50051"
            - name: NO_PROXY
              value: "aggregator,localhost,127.0.0.1"
            - name: no_proxy
              value: "aggregator,localhost,127.0.0.1"
            {{- if eq .Values.devices.RPPG_DEVICE "NPU" }}
            - name: ZE_ENABLE_ALT_DRIVERS
              value: "libze_intel_npu.so"
            {{- end }}
          volumeMounts:
            - name: models
              mountPath: /models
            - name: videos
              mountPath: /videos
            - name: dri
              mountPath: /dev/dri
            - name: dev
              mountPath: /dev
            {{- if eq .Values.devices.RPPG_DEVICE "NPU" }}
            - name: accel
              mountPath: /dev/accel
            {{- end }}
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: models-pvc
        - name: videos
          persistentVolumeClaim:
            claimName: videos-pvc
        - name: dri
          hostPath:
            path: /dev/dri
        - name: dev
          hostPath:
            path: /dev
        {{- if eq .Values.devices.RPPG_DEVICE "NPU" }}
        - name: accel
          hostPath:
            path: /dev/accel
        {{- end }}