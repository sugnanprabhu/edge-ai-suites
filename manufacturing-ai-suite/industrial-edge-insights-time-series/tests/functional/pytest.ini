[pytest]
log_cli=true  
log_level=DEBUG
log_file=tests.log
log_file_level=DEBUG 
log_format = %(asctime)s %(levelname)s %(message)s  
log_date_format = %Y-%m-%d %H:%M:%S
log_file_format = %(asctime)s - %(levelname)s - %(name)s - %(message)s

# Load pytest-env plugin to load environment variables
addopts = -p pytest_env

# Warning filters
filterwarnings =
    ignore::DeprecationWarning:influxdb_client.client.write.point
    ignore::DeprecationWarning:reactivex.internal.constants
    ignore:datetime.datetime.utcfromtimestamp.*is deprecated:DeprecationWarning

# Custom markers
markers =
    kpi: marks tests as Key Performance Indicator (KPI) tests
    mqtt: marks tests that exercise the MQTT ingestion path
    opcua: marks tests that exercise the OPC-UA ingestion path
    docker_security: marks tests as Docker-related security tests
    longrun: marks tests as long-running (1 hour or more)
    gpu: marks tests that require a GPU device

# environment variables for the tests
env =
    # Proxy configuration - leave empty for CI/CD (GitHub workflows will override)
    # For local testing, either set PROXY_URL or individual http_proxy/https_proxy environment variables
    # Example: PROXY_URL=http://proxy-iind.intel.com:912
    # The code will automatically use default Intel proxy if no proxy variables are set
    PROXY_URL=
    # Common variables
    FUNCTIONAL_FOLDER_PATH_FROM_TEST_FILE=../../../../../../tests/functional/
    target=localhost
    # Helm-specific variables
    release_name=ts-wind-turbine-anomaly
    release_name_weld=ts-weld-anomaly
    chart_path=../../helm/
    namespace=ts-sample-app
    wait_time_for_pods_to_come_up=90
    grafana_url=https://localhost:30001
    # Multimodal-specific Helm variables
    release_name_multi=multimodal-weld-defect-detection
    chart_path_multi=../../helm/
    namespace_multi=multimodal-sample-app
    wait_time_for_pods_to_come_up_multi=90
    grafana_url_multi=https://localhost:30001
    # Docker-specific variables
    docker_target=localhost
    wait_time_for_containers_to_come_up=30
    # Note: Port numbers are now dynamically retrieved from config files
    # using security_utils.get_dynamic_ports() instead of hardcoded values