<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="900" height="308" viewBox="0 0 900 308"
     style="background:#ffffff;font-family:Helvetica,Arial,sans-serif;">
  <defs>
    <marker id="arr" viewBox="0 0 10 8" refX="9" refY="4"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle"
        font-size="17" font-weight="bold" fill="#111">
    WinVisionAI &#x2014; Layered Architecture
  </text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LAYER 1 : WinVisionAI Application                             -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="10" y="48" width="880" height="82" rx="10"
        fill="#dff0fb" stroke="#0071c5" stroke-width="2"/>
  <!-- Config Loader -->
  <rect x="18" y="70" width="210" height="52" rx="6"
        fill="#ffffff" stroke="#0071c5" stroke-width="1.5"/>
  <text x="123" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="#0058a3">Config Loader</text>

  <!-- Pipeline Manager -->
  <rect x="236" y="70" width="210" height="52" rx="6"
        fill="#ffffff" stroke="#0071c5" stroke-width="1.5"/>
  <text x="341" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="#0058a3">Pipeline Manager</text>

  <!-- Media -->
  <rect x="454" y="70" width="210" height="52" rx="6"
        fill="#ffffff" stroke="#0071c5" stroke-width="1.5"/>
  <text x="559" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="#0058a3">Media Manager</text>

  <!-- Metrics Collector -->
  <rect x="672" y="70" width="210" height="52" rx="6"
        fill="#ffffff" stroke="#0071c5" stroke-width="1.5"/>
  <text x="777" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="#0058a3">Metrics Collector</text>

  <!-- Arrow 1 &#x2192; 2 -->
  <line x1="450" y1="131" x2="450" y2="147"
        stroke="#0071c5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LAYER 2 : Intel DL Streamer                                   -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="10" y="149" width="880" height="42" rx="10"
        fill="#dff0fb" stroke="#0071c5" stroke-width="2"/>
  <text x="450" y="181" text-anchor="middle" font-size="13" font-weight="bold" fill="#0058a3">
    Intel DL Streamer
  </text>

  <!-- Arrow 2 &#x2192; 3 -->
  <line x1="450" y1="192" x2="450" y2="208"
        stroke="#0071c5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LAYER 3 : OpenVINO Runtime + Hardware Targets                 -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="10" y="210" width="880" height="88" rx="10"
        fill="#dff0fb" stroke="#0071c5" stroke-width="2"/>
  <!-- CPU -->
  <rect x="18"  y="235" width="272" height="54" rx="6"
        fill="#ffffff" stroke="#0071c5" stroke-width="1.5"/>
  <text x="154" y="256" text-anchor="middle" font-size="12" font-weight="bold" fill="#0058a3">CPU</text>
  <text x="154" y="272" text-anchor="middle" font-size="9.5" fill="#0058a3">OpenVINO runtime &#xb7; system memory</text>

  <!-- GPU -->
  <rect x="300" y="235" width="272" height="54" rx="6"
        fill="#ffffff" stroke="#0071c5" stroke-width="1.5"/>
  <text x="436" y="256" text-anchor="middle" font-size="12" font-weight="bold" fill="#0058a3">GPU  (D3D11)</text>
  <text x="436" y="272" text-anchor="middle" font-size="9.5" fill="#0058a3">OpenVINO + D3D11 shared memory</text>

  <!-- NPU -->
  <rect x="582" y="235" width="300" height="54" rx="6"
        fill="#ffffff" stroke="#0071c5" stroke-width="1.5"/>
  <text x="732" y="256" text-anchor="middle" font-size="12" font-weight="bold" fill="#0058a3">NPU</text>
  <text x="732" y="272" text-anchor="middle" font-size="9.5" fill="#0058a3">OpenVINO runtime &#xb7; neural engine</text>

</svg>
