<?xml version="1.0" encoding="UTF-8"?>
<!-- Architecture diagram. Open / edit in draw.io -->
<svg xmlns="http://www.w3.org/2000/svg" version="1.1"
     width="820" height="480" viewBox="0 0 820 480"
     style="background:#ffffff;font-family:Helvetica,Arial,sans-serif;font-size:13px;">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0071c5"/>
    </marker>
  </defs>

  <text x="410" y="26" text-anchor="middle" font-size="18" font-weight="bold" fill="#111">Architecture</text>

  <!-- ===== Row 1: Inputs ===== -->
  <rect x="60"  y="42" width="200" height="50" rx="8" ry="8" fill="#dff0fb" stroke="#0071c5" stroke-width="1.5"/>
  <text x="160" y="62" text-anchor="middle" fill="#003d80" font-weight="bold">Video file</text>
  <text x="160" y="78" text-anchor="middle" fill="#0058a3" font-size="10">filesrc</text>

  <rect x="310" y="42" width="200" height="50" rx="8" ry="8" fill="#dff0fb" stroke="#0071c5" stroke-width="1.5"/>
  <text x="410" y="62" text-anchor="middle" fill="#003d80" font-weight="bold">RTSP camera</text>
  <text x="410" y="78" text-anchor="middle" fill="#0058a3" font-size="10">rtspsrc</text>

  <rect x="560" y="42" width="200" height="50" rx="8" ry="8" fill="#dff0fb" stroke="#0071c5" stroke-width="1.5"/>
  <text x="660" y="62" text-anchor="middle" fill="#003d80" font-weight="bold">GenICam camera</text>
  <text x="660" y="78" text-anchor="middle" fill="#0058a3" font-size="10">gencamsrc</text>

  <!-- Inputs &#x2192; Application band -->
  <path d="M160,92 L160,108 L410,108" stroke="#0071c5" stroke-width="1.5" fill="none"/>
  <path d="M410,92 L410,108"          stroke="#0071c5" stroke-width="1.5" fill="none"/>
  <path d="M660,92 L660,108 L410,108" stroke="#0071c5" stroke-width="1.5" fill="none"/>
  <path d="M410,108 L410,120"         stroke="#0071c5" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- ===== Application band ===== -->
  <rect x="10" y="122" width="800" height="106" rx="10" ry="10" fill="#dff0fb" stroke="#0071c5" stroke-width="1.5"/>

  <!-- Config Loader -->
  <rect x="18"  y="140" width="190" height="78" rx="6" ry="6" fill="#ffffff" stroke="#0071c5" stroke-width="1"/>
  <text x="113" y="166" text-anchor="middle" fill="#003d80" font-weight="bold" font-size="12">Config Loader</text>
  <text x="113" y="184" text-anchor="middle" fill="#0058a3" font-size="10">models &#xb7; pipelines</text>

  <!-- Pipeline Manager -->
  <rect x="214" y="140" width="190" height="78" rx="6" ry="6" fill="#ffffff" stroke="#0071c5" stroke-width="1"/>
  <text x="309" y="160" text-anchor="middle" fill="#003d80" font-weight="bold" font-size="12">Pipeline Manager</text>
  <text x="309" y="176" text-anchor="middle" fill="#0058a3" font-size="10">N parallel pipelines</text>
  <text x="309" y="190" text-anchor="middle" fill="#0058a3" font-size="10">FPS &#xb7; latency probes</text>

  <!-- Media Manager -->
  <rect x="410" y="140" width="190" height="78" rx="6" ry="6" fill="#ffffff" stroke="#0071c5" stroke-width="1"/>
  <text x="505" y="160" text-anchor="middle" fill="#003d80" font-weight="bold" font-size="12">Media Manager</text>
  <text x="505" y="176" text-anchor="middle" fill="#0058a3" font-size="10">manages MediaMTX</text>
  <text x="505" y="190" text-anchor="middle" fill="#0058a3" font-size="10">RTSP / WebRTC</text>

  <!-- Metrics Collector -->
  <rect x="606" y="140" width="196" height="78" rx="6" ry="6" fill="#ffffff" stroke="#0071c5" stroke-width="1"/>
  <text x="704" y="166" text-anchor="middle" fill="#003d80" font-weight="bold" font-size="12">Metrics Collector</text>
  <text x="704" y="184" text-anchor="middle" fill="#0058a3" font-size="10">log / Prometheus</text>

  <!-- Application &#x2192; DL Streamer -->
  <path d="M410,229 L410,245" stroke="#0071c5" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- ===== DL Streamer band ===== -->
  <rect x="10" y="247" width="800" height="54" rx="10" ry="10" fill="#dff0fb" stroke="#0071c5" stroke-width="1.5"/>
  <text x="410" y="269" text-anchor="middle" fill="#003d80" font-weight="bold" font-size="13">Intel DL Streamer</text>
  <text x="410" y="285" text-anchor="middle" fill="#0058a3" font-size="10">OpenVINO &#xb7; CPU / GPU / NPU</text>

  <!-- DL Streamer &#x2192; outputs -->
  <path d="M410,302 L410,320 L150,320" stroke="#0071c5" stroke-width="1.5" fill="none"/>
  <path d="M410,302 L410,320"          stroke="#0071c5" stroke-width="1.5" fill="none"/>
  <path d="M410,302 L410,320 L670,320" stroke="#0071c5" stroke-width="1.5" fill="none"/>
  <path d="M150,320 L150,336" stroke="#0071c5" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M410,320 L410,336" stroke="#0071c5" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M670,320 L670,336" stroke="#0071c5" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="252" y="316" text-anchor="middle" fill="#0058a3" font-size="11">video</text>
  <text x="418" y="316" text-anchor="middle" fill="#0058a3" font-size="11">metadata (mqtt)</text>
  <text x="580" y="316" text-anchor="middle" fill="#0058a3" font-size="11">metadata (file)</text>

  <!-- ===== Row 3: Outputs ===== -->
  <rect x="40"  y="338" width="220" height="62" rx="8" ry="8" fill="#dff0fb" stroke="#0071c5" stroke-width="1.5"/>
  <text x="150" y="361" text-anchor="middle" fill="#003d80" font-weight="bold">MediaMTX</text>
  <text x="150" y="377" text-anchor="middle" fill="#0058a3" font-size="10">RTSP :8554</text>
  <text x="150" y="391" text-anchor="middle" fill="#0058a3" font-size="10">WebRTC :8889</text>

  <rect x="300" y="338" width="220" height="62" rx="8" ry="8" fill="#dff0fb" stroke="#0071c5" stroke-width="1.5"/>
  <text x="410" y="361" text-anchor="middle" fill="#003d80" font-weight="bold">MQTT broker</text>
  <text x="410" y="377" text-anchor="middle" fill="#0058a3" font-size="10">tcp :1883</text>

  <rect x="560" y="338" width="220" height="62" rx="8" ry="8" fill="#dff0fb" stroke="#0071c5" stroke-width="1.5"/>
  <text x="670" y="361" text-anchor="middle" fill="#003d80" font-weight="bold">JSON file</text>
  <text x="670" y="377" text-anchor="middle" fill="#0058a3" font-size="10">gvametapublish</text>
  <text x="670" y="391" text-anchor="middle" fill="#0058a3" font-size="10">method=file</text>

  <!-- MediaMTX &#x2192; Browser/VLC -->
  <path d="M150,400 L150,416" stroke="#0071c5" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <!-- MQTT &#x2192; subscriber -->
  <path d="M410,400 L410,416" stroke="#0071c5" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- ===== Row 4: Viewers ===== -->
  <rect x="40"  y="418" width="220" height="52" rx="8" ry="8" fill="#dff0fb" stroke="#0071c5" stroke-width="1.5"/>
  <text x="150" y="438" text-anchor="middle" fill="#003d80" font-weight="bold">Browser / VLC</text>
  <text x="150" y="454" text-anchor="middle" fill="#0058a3" font-size="10">WebRTC / RTSP</text>

  <rect x="300" y="418" width="220" height="40" rx="8" ry="8" fill="#dff0fb" stroke="#0071c5" stroke-width="1.5"/>
  <text x="410" y="443" text-anchor="middle" fill="#003d80" font-weight="bold">MQTT subscriber</text>

  <!-- Media Manager &#x2192; MediaMTX (dashed, right edge) -->
  <path d="M810,179 L810,452 L25,452 L25,361 L40,361" stroke="#0071c5" stroke-width="1.4" fill="none" stroke-dasharray="5 4" marker-end="url(#a)"/>
  <text x="798" y="311" text-anchor="middle" fill="#0058a3" font-size="11" transform="rotate(-90 798 311)">start mediamtx.exe</text>

</svg>